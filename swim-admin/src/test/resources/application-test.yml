spring:
  datasource:
    url: jdbc:h2:mem:swimtest;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=VALUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema-h2.sql
      data-locations: classpath:db/data-h2.sql
